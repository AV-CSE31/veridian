name: Release Gates (RV3-014)

# Enforces the claim-to-test traceability matrix defined in
# planning/RELEASE_GATES.md. A failure here blocks merge regardless of
# reviewer approval.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  release-gates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Gate 1 — Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Gate 2 — Type check
        run: mypy veridian/ --strict

      - name: Gate 3 — Unit tests
        run: pytest tests/unit/ -x --tb=short -q

      - name: Gate 4 — Integration tests (Phase A/B/C/D suites)
        run: |
          pytest tests/integration/test_cli_new_project_smoke.py \
                 tests/integration/test_pause_resume.py \
                 tests/integration/test_replay_compat_runner.py \
                 tests/integration/test_activity_journal_runner.py \
                 tests/integration/test_replay_cli.py \
                 tests/integration/test_langgraph_adapter.py \
                 tests/integration/test_crewai_adapter.py \
                 tests/integration/test_langgraph_certification.py \
                 tests/integration/test_crewai_certification.py \
                 tests/integration/test_certification_matrix.py \
                 tests/integration/test_parallel_parity.py \
                 tests/integration/test_subgraph.py \
                 -x --tb=short -q

      - name: Gate 5 — Coverage
        run: pytest --cov=veridian --cov-fail-under=85 -q

      - name: Gate 6 — API stability pin
        run: pytest tests/unit/test_api_stability.py tests/unit/test_release_claims.py -x
