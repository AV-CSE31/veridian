name: IP Protection

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  protected-paths:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify confidential paths are not tracked
        run: python scripts/check_protected_paths.py --mode tracked
